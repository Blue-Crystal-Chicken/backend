# SPA cassa + reverse-proxy verso il backend principale (8080) per API e immagini.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # API
    location /api/ {
        set $backend http://bcc-backend:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Immagini prodotti/menu servite dal backend (/images e /uploads/images)
    location /images/ {
        set $backend http://bcc-backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }
    location /uploads/ {
        set $backend http://bcc-backend:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # SPA: ogni rotta sconosciuta torna index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
