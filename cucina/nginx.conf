# SPA cucina + reverse-proxy /api → backend principale (8080).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS interno di Docker: risolve i nomi dei servizi a runtime, così nginx
    # parte anche se il backend non è ancora pronto.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Tutte le chiamate /api/* vanno al backend principale.
    location /api/ {
        set $backend http://bcc-backend:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: ogni rotta sconosciuta torna index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
