# SPA admin + reverse-proxy verso DUE backend.
# Precedenza nginx: vince il prefisso più lungo, quindi /api/notification/ batte
# /api/ e finisce al servizio notifiche; tutto il resto di /api va al backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # ---- Servizio notifiche Firebase (8085) ----
    location /api/notification/ {
        set $notif http://bcc-notification:8085;
        proxy_pass $notif;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /devices {
        set $notif http://bcc-notification:8085;
        proxy_pass $notif;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /user-devices {
        set $notif http://bcc-notification:8085;
        proxy_pass $notif;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /device-notifications {
        set $notif http://bcc-notification:8085;
        proxy_pass $notif;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Backend principale (8080): tutto il resto di /api ----
    location /api/ {
        set $backend http://bcc-backend:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- SPA ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
